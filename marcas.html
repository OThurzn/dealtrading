<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description"
    content="DEAL TRADING — Marcas parceiras. Conheça os fabricantes internacionais que distribuímos no Brasil.">
  <meta name="theme-color" content="#0d0d0d">
  <title>Marcas | DEAL TRADING</title>
  <link rel="icon" type="image" href="src\imgs\logo.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    crossorigin="anonymous" referrerpolicy="no-referrer">
  <link rel="stylesheet" href="src/assets/css/styles.css">
  <script src="src/assets/js/layout.js" defer></script>
</head>

<body>
  <div id="site-header-mount"></div>

  <main id="marcas-content">
    <div class="page-hero">
      <div class="container">
        <nav class="breadcrumb" aria-label="Breadcrumb">
          <a href="index.html">Início</a>
          <i class="fa-solid fa-chevron-right" aria-hidden="true"></i>
          <span>Marcas</span>
        </nav>
        <p class="page-hero__eyebrow">Portfólio</p>
        <h1>Nossas Marcas</h1>
        <p>Fabricantes internacionais selecionados com rigor. Clique em uma marca para ver detalhes e acessar o
          catálogo.</p>
      </div>
    </div>

    <div class="filters-bar" role="navigation" aria-label="Filtrar por categoria">
      <div class="container" id="filters-container">
        <button class="filter-btn is-active" data-filter="todos" type="button">Todos</button>
      </div>
    </div>

    <section class="marcas-main">
      <div class="container">
        <p class="marcas-count" id="marcas-count" aria-live="polite"></p>

        <div class="marcas-grid" id="marcas-grid" role="list" aria-label="Marcas">
          <div class="skeleton-card" aria-hidden="true">
            <div class="sk sk-logo-area"></div>
            <div class="sk-body">
              <div class="sk sk-line sk-line--sm"></div>
              <div class="sk sk-title"></div>
            </div>
          </div>
          <div class="skeleton-card" aria-hidden="true">
            <div class="sk sk-logo-area"></div>
            <div class="sk-body">
              <div class="sk sk-line sk-line--md"></div>
              <div class="sk sk-title"></div>
            </div>
          </div>
        </div>

        <div class="brands-empty" id="brands-empty" role="status" aria-live="polite">
          <i class="fa-solid fa-box-open" aria-hidden="true"></i>
          <p>Nenhuma marca encontrada para esse filtro.</p>
          <button type="button" id="empty-reset" class="brands-empty__action">
            Ver todas as marcas
          </button>
        </div>
      </div>
    </section>
  </main>

  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="modal-name"
    tabindex="-1">
    <div class="modal" id="modal" role="document">
      <div class="modal__head">
        <div class="modal__logo" id="modal-logo" aria-hidden="true"></div>
        <div class="modal__titles">
          <p class="modal__cat" id="modal-cat"></p>
          <h2 class="modal__name" id="modal-name"></h2>
        </div>
        <button class="modal__close" id="modal-close" aria-label="Fechar">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>
      <div class="modal__body">
        <p class="modal__desc" id="modal-desc"></p>
        <div class="modal__meta" id="modal-meta"></div>
        <div id="modal-files"></div>
      </div>
    </div>
  </div>

  <div id="site-footer-mount"></div>

  <script src="src/assets/js/marcas.js"></script>
</body>

</html>
